name: Build Android APK

# Builds a debug-signed, sideloadable release APK on GitHub's own runners
# (this repo has no local Flutter/Android SDK toolchain) and distributes it
# via Firebase App Distribution — testers get an email + install page
# straight from Firebase, no GitHub Release/download link needed.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # android/ isn't committed to this repo (generated on demand) — this
      # scaffolds it fresh without touching the existing lib/ code.
      # --project-name is required here: without it, `flutter create .`
      # infers the project name from the checkout directory's basename,
      # which on GitHub Actions is the repo name
      # "code-for-community-final-set-" — invalid as a Dart identifier
      # (hyphens, trailing hyphen) and fails the whole step immediately.
      - name: Generate Android platform folder
        run: flutter create . --platforms=android --project-name praja_dhvani

      # Forces applicationId/namespace to com.prajadhvani.app (matching
      # firebase_options.dart) AND relocates MainActivity.kt to the
      # matching package path — AGP requires the two to agree, and
      # whatever org/name `flutter create` inferred from the existing
      # pubspec.yaml won't match by default.
      - name: Set the real application ID (com.prajadhvani.app)
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          target = "com.prajadhvani.app"

          for name in ("build.gradle", "build.gradle.kts"):
              path = pathlib.Path("android/app") / name
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              text = re.sub(r'applicationId\s*=?\s*"[^"]*"', f'applicationId = "{target}"', text)
              text = re.sub(r'namespace\s*=?\s*"[^"]*"', f'namespace = "{target}"', text)
              path.write_text(text, encoding="utf-8")

          for lang, ext in (("kotlin", "kt"), ("java", "java")):
              base = pathlib.Path("android/app/src/main") / lang
              if not base.exists():
                  continue
              matches = list(base.rglob(f"MainActivity.{ext}"))
              if not matches:
                  continue
              old_file = matches[0]
              new_dir = base / pathlib.Path(*target.split("."))
              new_dir.mkdir(parents=True, exist_ok=True)
              new_file = new_dir / old_file.name
              text = old_file.read_text(encoding="utf-8")
              text = re.sub(r"^package .*$", f"package {target}", text, count=1, flags=re.MULTILINE)
              new_file.write_text(text, encoding="utf-8")
              if old_file != new_file:
                  old_file.unlink()
          PY

      - name: Install the real Firebase Android config
        run: cp firebase_config/google-services.json android/app/google-services.json

      # image_picker (camera/gallery) and record (microphone) need runtime
      # permissions declared — flutter create's default manifest doesn't
      # include them, and this isn't committed anywhere else since android/
      # itself isn't committed.
      - name: Add required Android permissions
        run: |
          python3 - <<'PY'
          path = "android/app/src/main/AndroidManifest.xml"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()
          permissions = "\n".join(
              f'    <uses-permission android:name="android.permission.{p}" />'
              for p in [
                  "INTERNET",
                  "CAMERA",
                  "RECORD_AUDIO",
                  "READ_MEDIA_IMAGES",
                  "READ_EXTERNAL_STORAGE",
                  "ACCESS_FINE_LOCATION",
                  "ACCESS_COARSE_LOCATION",
              ]
          )
          marker = "<application"
          if "android.permission.CAMERA" not in content:
              content = content.replace(marker, permissions + "\n\n    " + marker, 1)
          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          PY

      - name: Install dependencies
        run: flutter pub get

      # Flutter's generated build.gradle signs the release APK with the
      # `debug` signingConfig, which reads ~/.android/debug.keystore. CI would
      # otherwise generate a fresh random debug keystore every run, changing
      # the app's SHA fingerprint each build — which breaks Firebase Phone
      # Auth (the SHA can never be registered). Overriding it with our stable,
      # committed keystore (standard debug alias/passwords) gives every build
      # one fixed fingerprint, whose SHA-1/SHA-256 are registered in the
      # Firebase project so phone OTP works. This is a debug/sideload signing
      # key only — NOT a Play Store upload key.
      - name: Install stable signing keystore (for a constant SHA)
        run: |
          mkdir -p ~/.android
          cp ci-keystore/prajadhvani-debug.keystore ~/.android/debug.keystore

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK with build number
        run: cp build/app/outputs/flutter-apk/app-release.apk prajadhwani-${{ github.run_number }}.apk

      - uses: actions/upload-artifact@v4
        with:
          name: prajadhwani-apk
          path: prajadhwani-${{ github.run_number }}.apk

      # Uploads straight to Firebase App Distribution — testers get an
      # email with an install link (Firebase hosts the APK; no GitHub
      # download/unknown-sources dance beyond the one-time Firebase
      # tester invite). Auth is a dedicated service account
      # (github-appdistribution@code-for-community-e2cf2.iam.gserviceaccount.com,
      # role: Firebase App Distribution Admin only) whose JSON key is
      # stored as the FIREBASE_APPDISTRO_SA_KEY repo secret.
      - name: Distribute via Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: '1:830098066112:android:3f605559297211dfcf7b25'
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_APPDISTRO_SA_KEY }}
          testers: saikavitha1975@gmail.com
          file: prajadhwani-${{ github.run_number }}.apk
          releaseNotes: "Auto-built from commit ${{ github.sha }}"
