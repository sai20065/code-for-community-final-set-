name: praja_dhvani
description: >
  Praja Dhvani (ಪ್ರಜಾ ಧ್ವನಿ / प्रजा ध्वनि — "Voice of the People") —
  AI-powered civic grievance & constituency insights app. Citizens report
  local problems by voice, text, or photo; MPs/officials see a color-coded
  map of constituency problem density.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  cloud_functions: ^5.1.3

  # Navigation & state
  go_router: ^14.2.7
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.3.2

  # Location — free/open-source mapping (OpenStreetMap tiles, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  geolocator: ^13.0.1

  # Media
  record: ^7.1.1
  image_picker: ^1.1.2
  audioplayers: ^6.1.0
  path_provider: ^2.1.4

  # UX polish
  lottie: ^3.1.3
  intl: ^0.20.2
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1

  # Reports
  printing: ^5.13.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/lottie/
    - assets/images/
